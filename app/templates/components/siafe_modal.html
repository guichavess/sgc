{# Modal de Atualização SIAFE - apenas para Pedro Alexandre #}
<div class="modal fade" id="siafeModal" tabindex="-1" aria-labelledby="siafeModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header" style="background: linear-gradient(135deg, #343990, #5b60c8); border: none;">
                <h5 class="modal-title text-white" id="siafeModalLabel">
                    <i class="bi bi-arrow-repeat me-2"></i>Atualizar Base de Dados
                </h5>
            </div>
            <div class="modal-body px-4 py-3">
                {# Fase 1: Seleção de scripts #}
                <div id="siafe-selecao">
                    {# Grupo SIAFE #}
                    <div class="mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-2 pb-2 border-bottom">
                            <span class="fw-bold text-primary small text-uppercase ls-1">
                                <i class="bi bi-database me-1"></i>SIAFE
                            </span>
                            <div class="form-check form-check-inline mb-0">
                                <input class="form-check-input" type="checkbox" id="siafe-check-todos" checked>
                                <label class="form-check-label small fw-medium" for="siafe-check-todos">Todos</label>
                            </div>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-reserva">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="reserva" id="siafe-check-reserva" data-grupo="siafe" checked>
                                    <i class="bi bi-bookmark-star text-primary me-2"></i>
                                    <span class="small fw-medium">Reservas</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-empenho">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="empenho" id="siafe-check-empenho" data-grupo="siafe" checked>
                                    <i class="bi bi-wallet2 text-success me-2"></i>
                                    <span class="small fw-medium">Empenhos</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-liquidacao">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="liquidacao" id="siafe-check-liquidacao" data-grupo="siafe" checked>
                                    <i class="bi bi-receipt text-info me-2"></i>
                                    <span class="small fw-medium">Liquidações</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-pd">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="pd" id="siafe-check-pd" data-grupo="siafe" checked>
                                    <i class="bi bi-file-earmark-text text-warning me-2"></i>
                                    <span class="small fw-medium">PDs</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-ob">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="ob" id="siafe-check-ob" data-grupo="siafe" checked>
                                    <i class="bi bi-bank text-danger me-2"></i>
                                    <span class="small fw-medium">OBs</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-contratos">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="contratos" id="siafe-check-contratos" data-grupo="siafe" checked>
                                    <i class="bi bi-file-earmark-ruled text-secondary me-2"></i>
                                    <span class="small fw-medium">Contratos</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    {# Grupo LOA - Separado #}
                    <div>
                        <div class="d-flex align-items-center mb-2 pb-2 border-bottom">
                            <span class="fw-bold text-success small text-uppercase ls-1">
                                <i class="bi bi-bar-chart-line me-1"></i>Orçamento
                            </span>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-loa">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="loa" id="siafe-check-loa" data-grupo="loa">
                                    <i class="bi bi-bar-chart-line text-success me-2"></i>
                                    <span class="small fw-medium">LOA</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    {# Grupo SEI #}
                    <div class="mt-3">
                        <div class="d-flex align-items-center mb-2 pb-2 border-bottom">
                            <span class="fw-bold text-warning small text-uppercase ls-1">
                                <i class="bi bi-envelope-paper me-1"></i>SEI
                            </span>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="siafe-card d-flex align-items-center p-2 rounded-3 border" for="siafe-check-sei">
                                    <input class="form-check-input siafe-check-item me-2" type="checkbox" value="sei" id="siafe-check-sei" data-grupo="sei">
                                    <i class="bi bi-envelope-paper text-warning me-2"></i>
                                    <span class="small fw-medium">Etapas SEI</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                {# Fase 2: Progresso da execução #}
                <div id="siafe-progresso" class="d-none">
                    <div id="siafe-lista"></div>
                    <div id="siafe-resumo" class="mt-3 d-none">
                        <div class="alert mb-0 py-2 px-3 d-flex align-items-center" id="siafe-resumo-alert">
                            <i class="bi me-2 fs-5" id="siafe-resumo-icon"></i>
                            <span id="siafe-resumo-texto"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" id="siafe-cancelar-btn" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary px-4" id="siafe-iniciar-btn" style="background: linear-gradient(135deg, #343990, #5b60c8); border: none;">
                    <i class="bi bi-play-fill me-1"></i>Iniciar
                </button>
                <button type="button" class="btn btn-secondary d-none" id="siafe-fechar-btn" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>

<style>
.siafe-card {
    cursor: pointer;
    transition: all .15s ease;
    background: #f8f9fa;
}
.siafe-card:hover {
    background: #e9ecef;
    border-color: #adb5bd !important;
}
.siafe-card:has(input:checked) {
    background: #e8f0fe;
    border-color: #4a6cf7 !important;
}
</style>

<script>
(function() {
    const ICONS = {
        pendente: '<i class="bi bi-circle text-secondary"></i>',
        running:  '<span class="spinner-border spinner-border-sm text-primary" role="status"></span>',
        ok:       '<i class="bi bi-check-circle-fill text-success"></i>',
        erro:     '<i class="bi bi-x-circle-fill text-danger"></i>'
    };

    const NAME_ICONS = {
        reserva: '<i class="bi bi-bookmark-star me-1 text-primary"></i>Reservas',
        empenho: '<i class="bi bi-wallet2 me-1 text-success"></i>Empenhos',
        liquidacao: '<i class="bi bi-receipt me-1 text-info"></i>Liquidações',
        pd: '<i class="bi bi-file-earmark-text me-1 text-warning"></i>PDs',
        ob: '<i class="bi bi-bank me-1 text-danger"></i>OBs',
        contratos: '<i class="bi bi-file-earmark-ruled me-1 text-secondary"></i>Contratos',
        loa: '<i class="bi bi-bar-chart-line me-1 text-success"></i>LOA',
        sei: '<i class="bi bi-envelope-paper me-1 text-warning"></i>Etapas SEI'
    };

    let pollTimer = null;
    const modalEl = document.getElementById('siafeModal');
    const modal = new bootstrap.Modal(modalEl);
    const selecaoDiv = document.getElementById('siafe-selecao');
    const progressoDiv = document.getElementById('siafe-progresso');
    const listaDiv = document.getElementById('siafe-lista');
    const resumoDiv = document.getElementById('siafe-resumo');
    const resumoAlert = document.getElementById('siafe-resumo-alert');
    const resumoIcon = document.getElementById('siafe-resumo-icon');
    const resumoTexto = document.getElementById('siafe-resumo-texto');
    const iniciarBtn = document.getElementById('siafe-iniciar-btn');
    const cancelarBtn = document.getElementById('siafe-cancelar-btn');
    const fecharBtn = document.getElementById('siafe-fechar-btn');
    const checkTodos = document.getElementById('siafe-check-todos');
    const checkItems = document.querySelectorAll('.siafe-check-item');
    const siafeItems = document.querySelectorAll('.siafe-check-item[data-grupo="siafe"]');

    // "Selecionar Todos" only toggles SIAFE group
    checkTodos.addEventListener('change', function() {
        siafeItems.forEach(cb => cb.checked = this.checked);
    });
    siafeItems.forEach(cb => {
        cb.addEventListener('change', function() {
            checkTodos.checked = [...siafeItems].every(c => c.checked);
        });
    });

    function resetModal() {
        selecaoDiv.classList.remove('d-none');
        progressoDiv.classList.add('d-none');
        listaDiv.innerHTML = '';
        resumoDiv.classList.add('d-none');
        iniciarBtn.classList.remove('d-none');
        cancelarBtn.classList.remove('d-none');
        fecharBtn.classList.add('d-none');
        // Reset checkboxes: SIAFE all checked, LOA unchecked
        checkTodos.checked = true;
        siafeItems.forEach(cb => cb.checked = true);
        document.getElementById('siafe-check-loa').checked = false;
    }

    function getSelectedScripts() {
        return [...checkItems].filter(cb => cb.checked).map(cb => cb.value);
    }

    function buildProgressList(selectedIds) {
        listaDiv.innerHTML = selectedIds.map(function(id, i) {
            return '<div class="siafe-item d-flex align-items-center py-2' +
                (i < selectedIds.length - 1 ? ' border-bottom' : '') +
                '" data-idx="' + i + '">' +
                '<span class="siafe-status-icon me-3 fs-5">' + ICONS.pendente + '</span>' +
                '<span class="fw-medium">' + (NAME_ICONS[id] || id) + '</span></div>';
        }).join('');
    }

    function updateUI(data) {
        var items = listaDiv.querySelectorAll('.siafe-item');
        data.scripts.forEach(function(s, i) {
            if (items[i]) {
                items[i].querySelector('.siafe-status-icon').innerHTML = ICONS[s.status] || ICONS.pendente;
            }
        });

        if (!data.running) {
            clearInterval(pollTimer);
            pollTimer = null;
            fecharBtn.classList.remove('d-none');

            var ok = data.scripts.filter(function(s) { return s.status === 'ok'; }).length;
            var total = data.scripts.length;
            var allOk = ok === total;

            resumoAlert.className = 'alert mb-0 py-2 px-3 d-flex align-items-center ' + (allOk ? 'alert-success' : 'alert-warning');
            resumoIcon.className = 'bi me-2 fs-5 ' + (allOk ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill');
            resumoTexto.textContent = allOk
                ? 'Todos os ' + total + ' itens atualizados com sucesso!'
                : ok + '/' + total + ' OK. Verifique os erros acima.';
            resumoDiv.classList.remove('d-none');
        }
    }

    function pollStatus() {
        fetch('/api/atualizar-siafe/status')
            .then(function(r) { return r.json(); })
            .then(updateUI)
            .catch(function() {});
    }

    function startUpdate(selected) {
        selecaoDiv.classList.add('d-none');
        progressoDiv.classList.remove('d-none');
        iniciarBtn.classList.add('d-none');
        cancelarBtn.classList.add('d-none');
        buildProgressList(selected);

        fetch('/api/atualizar-siafe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({scripts: selected})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.erro) {
                resumoAlert.className = 'alert mb-0 py-2 px-3 d-flex align-items-center alert-danger';
                resumoIcon.className = 'bi me-2 fs-5 bi-x-circle-fill';
                resumoTexto.textContent = data.erro;
                resumoDiv.classList.remove('d-none');
                fecharBtn.classList.remove('d-none');
                return;
            }
            pollTimer = setInterval(pollStatus, 2000);
            setTimeout(pollStatus, 500);
        })
        .catch(function() {
            resumoAlert.className = 'alert mb-0 py-2 px-3 d-flex align-items-center alert-danger';
            resumoIcon.className = 'bi me-2 fs-5 bi-x-circle-fill';
            resumoTexto.textContent = 'Erro ao iniciar atualização.';
            resumoDiv.classList.remove('d-none');
            fecharBtn.classList.remove('d-none');
        });
    }

    iniciarBtn.addEventListener('click', function() {
        var selected = getSelectedScripts();
        if (selected.length === 0) {
            alert('Selecione ao menos um item para atualizar.');
            return;
        }
        startUpdate(selected);
    });

    document.addEventListener('click', function(e) {
        var btn = e.target.closest('#btn-atualizar-siafe, #btn-atualizar-siafe-hub');
        if (!btn) return;
        e.preventDefault();
        resetModal();
        modal.show();
    });

    modalEl.addEventListener('hidden.bs.modal', function() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    });
})();
</script>
