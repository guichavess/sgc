{# Modal de Atualização SIAFE - apenas para Pedro Alexandre #}
<div class="modal fade" id="siafeModal" tabindex="-1" aria-labelledby="siafeModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="siafeModalLabel">
                    <i class="bi bi-arrow-repeat me-2"></i>Atualização SIAFE
                </h5>
            </div>
            <div class="modal-body px-4 py-3">
                <div id="siafe-lista">
                    <div class="siafe-item d-flex align-items-center py-2 border-bottom" data-idx="0">
                        <span class="siafe-status-icon me-3 fs-5"><i class="bi bi-circle text-secondary"></i></span>
                        <span class="fw-medium">Contratos</span>
                    </div>
                    <div class="siafe-item d-flex align-items-center py-2 border-bottom" data-idx="1">
                        <span class="siafe-status-icon me-3 fs-5"><i class="bi bi-circle text-secondary"></i></span>
                        <span class="fw-medium">Empenhos</span>
                    </div>
                    <div class="siafe-item d-flex align-items-center py-2 border-bottom" data-idx="2">
                        <span class="siafe-status-icon me-3 fs-5"><i class="bi bi-circle text-secondary"></i></span>
                        <span class="fw-medium">PDs</span>
                    </div>
                    <div class="siafe-item d-flex align-items-center py-2 border-bottom" data-idx="3">
                        <span class="siafe-status-icon me-3 fs-5"><i class="bi bi-circle text-secondary"></i></span>
                        <span class="fw-medium">OBs</span>
                    </div>
                    <div class="siafe-item d-flex align-items-center py-2" data-idx="4">
                        <span class="siafe-status-icon me-3 fs-5"><i class="bi bi-circle text-secondary"></i></span>
                        <span class="fw-medium">Liquidações</span>
                    </div>
                </div>
                <div id="siafe-resumo" class="mt-3 d-none">
                    <div class="alert mb-0 py-2 px-3 d-flex align-items-center" id="siafe-resumo-alert">
                        <i class="bi me-2 fs-5" id="siafe-resumo-icon"></i>
                        <span id="siafe-resumo-texto"></span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="siafe-fechar-btn" data-bs-dismiss="modal" disabled>Fechar</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const ICONS = {
        pendente: '<i class="bi bi-circle text-secondary"></i>',
        running:  '<span class="spinner-border spinner-border-sm text-primary" role="status"></span>',
        ok:       '<i class="bi bi-check-circle-fill text-success"></i>',
        erro:     '<i class="bi bi-x-circle-fill text-danger"></i>'
    };

    let pollTimer = null;
    const modal = new bootstrap.Modal(document.getElementById('siafeModal'));
    const items = document.querySelectorAll('.siafe-item');
    const resumoDiv = document.getElementById('siafe-resumo');
    const resumoAlert = document.getElementById('siafe-resumo-alert');
    const resumoIcon = document.getElementById('siafe-resumo-icon');
    const resumoTexto = document.getElementById('siafe-resumo-texto');
    const fecharBtn = document.getElementById('siafe-fechar-btn');

    function resetModal() {
        items.forEach(item => {
            item.querySelector('.siafe-status-icon').innerHTML = ICONS.pendente;
        });
        resumoDiv.classList.add('d-none');
        fecharBtn.disabled = true;
    }

    function updateUI(data) {
        data.scripts.forEach((s, i) => {
            if (items[i]) {
                items[i].querySelector('.siafe-status-icon').innerHTML = ICONS[s.status] || ICONS.pendente;
            }
        });

        if (!data.running) {
            clearInterval(pollTimer);
            pollTimer = null;
            fecharBtn.disabled = false;

            const ok = data.scripts.filter(s => s.status === 'ok').length;
            const total = data.scripts.length;
            const allOk = ok === total;

            resumoAlert.className = 'alert mb-0 py-2 px-3 d-flex align-items-center ' + (allOk ? 'alert-success' : 'alert-warning');
            resumoIcon.className = 'bi me-2 fs-5 ' + (allOk ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill');
            resumoTexto.textContent = allOk
                ? 'Todos os ' + total + ' scripts executados com sucesso!'
                : ok + '/' + total + ' scripts OK. Verifique os erros acima.';
            resumoDiv.classList.remove('d-none');
        }
    }

    function pollStatus() {
        fetch('/api/atualizar-siafe/status')
            .then(r => r.json())
            .then(updateUI)
            .catch(() => {});
    }

    // Bind ao botão (navbar ou hub)
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('#btn-atualizar-siafe, #btn-atualizar-siafe-hub');
        if (!btn) return;
        e.preventDefault();

        resetModal();
        modal.show();

        fetch('/api/atualizar-siafe', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.erro) {
                    resumoAlert.className = 'alert mb-0 py-2 px-3 d-flex align-items-center alert-danger';
                    resumoIcon.className = 'bi me-2 fs-5 bi-x-circle-fill';
                    resumoTexto.textContent = data.erro;
                    resumoDiv.classList.remove('d-none');
                    fecharBtn.disabled = false;
                    return;
                }
                pollTimer = setInterval(pollStatus, 3000);
                setTimeout(pollStatus, 500);
            })
            .catch(() => {
                resumoAlert.className = 'alert mb-0 py-2 px-3 d-flex align-items-center alert-danger';
                resumoIcon.className = 'bi me-2 fs-5 bi-x-circle-fill';
                resumoTexto.textContent = 'Erro ao iniciar atualização.';
                resumoDiv.classList.remove('d-none');
                fecharBtn.disabled = false;
            });
    });

    // Limpa polling ao fechar modal
    document.getElementById('siafeModal').addEventListener('hidden.bs.modal', function() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    });
})();
</script>
