{% extends "base_layout.html" %}

{% block title %}SGC - Usuarios{% endblock %}
{% block module_name %}Usuarios{% endblock %}

{% block sidebar_links %}
<div class="sidebar-section-label">Usuarios</div>
<ul class="sidebar-menu">
    <li>
        <a class="sidebar-link {{ 'active' if request.endpoint == 'usuarios.dashboard' }}"
           href="{{ url_for('usuarios.dashboard') }}">
            <i class="bi bi-people"></i> Usuarios
        </a>
    </li>
    <li>
        <a class="sidebar-link {{ 'active' if request.endpoint and (request.endpoint.startswith('usuarios.perfis') or request.endpoint == 'usuarios.perfil_novo' or request.endpoint == 'usuarios.perfil_editar') }}"
           href="{{ url_for('usuarios.perfis_index') }}">
            <i class="bi bi-shield-lock"></i> Perfis
        </a>
    </li>
</ul>
{% endblock %}
