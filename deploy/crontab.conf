# =============================================================================
# SGC - Crontab do usuario sead
#
# Instalação:
#   crontab deploy/crontab.conf
#
# Verificar:
#   crontab -l
#
# Monitorar logs:
#   tail -f /home/sead/sgc_novo/logs/cron_noturno_$(date +%Y%m%d).log
# =============================================================================

# Variáveis de ambiente
SHELL=/bin/bash
PATH=/home/sead/sgc_novo/.venv/bin:/usr/local/bin:/usr/bin:/bin

# ----------------------------------------
# Atualização periódica (contratos + SIAFE)
# Roda 4x ao dia: 00:00, 06:00, 12:00, 18:00
# Segunda a sexta
# ----------------------------------------
0 0,6,12,18 * * 1-5 /bin/bash /home/sead/sgc_novo/scripts/cron_noturno.sh >> /home/sead/sgc_novo/logs/cron.log 2>&1
